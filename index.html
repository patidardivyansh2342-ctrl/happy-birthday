<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kamna Didi 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #ffb6d9;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Caveat', cursive;
}

canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.card {
  text-align: center;
  z-index: 10;
  position: relative;
}

.small-text {
  font-size: clamp(1rem, 2.5vw, 1.4rem);
  color: #fff;
  letter-spacing: 3px;
  opacity: 0;
  animation: slideUp 0.8s ease 0.5s forwards;
}

.big-text {
  font-size: clamp(3.5rem, 11vw, 9rem);
  font-weight: 700;
  color: #fff;
  line-height: 1;
  text-shadow: 0 4px 20px rgba(180, 0, 80, 0.3);
  opacity: 0;
  animation: slideUp 0.8s ease 1s forwards;
}

.name-text {
  font-size: clamp(2.2rem, 7vw, 6rem);
  font-weight: 700;
  color: #ffe4f0;
  text-shadow: 0 3px 15px rgba(180, 0, 80, 0.25);
  margin-top: -8px;
  opacity: 0;
  animation: slideUp 0.8s ease 1.4s forwards;
}

.line {
  width: 0;
  height: 2px;
  background: rgba(255,255,255,0.6);
  margin: 12px auto;
  border-radius: 2px;
  animation: grow 0.8s ease 1.8s forwards;
}

.msg {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  color: rgba(255,255,255,0.85);
  margin-top: 10px;
  opacity: 0;
  animation: slideUp 0.8s ease 2.2s forwards;
  letter-spacing: 1px;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes grow {
  from { width: 0; }
  to   { width: min(280px, 60vw); }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="card">
  <div class="small-text">✦ with love ✦</div>
  <div class="big-text">Happy Birthday</div>
  <div class="name-text">Kamna Didi 🌸</div>
  <div class="line"></div>
  <div class="msg">wishing you all the happiness in the world 💖</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width  = window.innerWidth;
const H = canvas.height = window.innerHeight;

const PI2 = Math.PI * 2;
const rnd = (a, b) => a + Math.random() * (b - a);

function drawHeart(x, y, size, alpha, col) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.28);
  ctx.bezierCurveTo(x-size*.05, y+size*.08, x-size*.58, y-size*.08, x-size*.5, y-size*.28);
  ctx.bezierCurveTo(x-size*.38, y-size*.58, x, y-size*.43, x, y-size*.18);
  ctx.bezierCurveTo(x, y-size*.43, x+size*.38, y-size*.58, x+size*.5, y-size*.28);
  ctx.bezierCurveTo(x+size*.58, y-size*.08, x+size*.05, y+size*.08, x, y+size*.28);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

const hearts = Array.from({ length: 22 }, () => ({
  x: rnd(0, W),
  y: rnd(-H, H),
  size: rnd(10, 32),
  alpha: rnd(0.12, 0.45),
  vy: rnd(0.4, 1.1),
  vx: rnd(-0.2, 0.2),
  swing: rnd(0, PI2),
  ss: rnd(0.015, 0.03),
  col: `hsl(${rnd(330, 360) | 0}, 80%, ${rnd(70, 88) | 0}%)`
}));

const sparkles = Array.from({ length: 40 }, () => ({
  x: rnd(0, W),
  y: rnd(0, H),
  r: rnd(1, 3),
  alpha: rnd(0.2, 0.9),
  phase: rnd(0, PI2),
  spd: rnd(0.02, 0.06)
}));

function loop() {
  ctx.fillStyle = 'rgba(255, 182, 217, 0.18)';
  ctx.fillRect(0, 0, W, H);

  hearts.forEach(h => {
    h.swing += h.ss;
    h.x += h.vx + Math.sin(h.swing) * 0.4;
    h.y += h.vy;
    if (h.y > H + 50) { h.y = -50; h.x = rnd(0, W); }
    drawHeart(h.x, h.y, h.size, h.alpha, h.col);
  });

  sparkles.forEach(s => {
    s.phase += s.spd;
    const a = s.alpha * (0.4 + 0.6 * Math.sin(s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, PI2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
